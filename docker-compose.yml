services:
  resumekit:
    build: .
    ports:
      - "7878:7878"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./generated:/app/generated
      - ./templates:/app/templates
      - ./ui:/app/ui
      - ./server.py:/app/server.py
    command:
      [
        "uv",
        "run",
        "server.py",
        "--details",
        "/app/templates/classic/details.personal.yml",
      ]
