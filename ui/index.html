<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yamlcv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f0f;
        --surface: #161616;
        --border: #252525;
        --text: #e8e8e8;
        --muted: #666;
        --accent: #c8f562;
        --accent-dim: rgba(200, 245, 98, 0.08);
        --red: #ff6b6b;
        --font-mono: "DM Mono", monospace;
        --font-sans: "DM Sans", sans-serif;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        overflow: hidden;
      }

      /* TOP BAR */
      header {
        height: 48px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        position: relative;
        z-index: 10;
      }

      .logo {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--accent);
      }

      .logo span {
        color: var(--muted);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .status {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.3s;
      }

      .status-dot.building {
        background: #f5a623;
        animation: pulse 1s infinite;
      }
      .status-dot.ready {
        background: var(--accent);
      }
      .status-dot.error {
        background: var(--red);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .btn-save {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        background: var(--accent);
        color: #0f0f0f;
        border: none;
        padding: 6px 14px;
        border-radius: 4px;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .btn-save:hover {
        opacity: 0.85;
      }
      .btn-save:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* MAIN SPLIT */
      .split {
        display: flex;
        height: calc(100vh - 48px);
      }

      /* LEFT — EDITOR */
      .editor-pane {
        width: 42%;
        min-width: 320px;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        position: relative;
      }

      .pane-header {
        height: 36px;
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .pane-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .template-select {
        font-family: var(--font-mono);
        font-size: 11px;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 2px 6px;
        outline: none;
        cursor: pointer;
      }

      .template-select:focus {
        border-color: var(--accent);
      }

      .editor-wrap {
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .CodeMirror {
        height: 100% !important;
        font-family: var(--font-mono) !important;
        font-size: 12.5px !important;
        line-height: 1.7 !important;
        background: var(--bg) !important;
      }

      .CodeMirror-scroll {
        padding: 8px 0;
      }
      .CodeMirror-cursor {
        border-left: 2px solid var(--accent) !important;
      }
      .CodeMirror-selected {
        background: var(--accent-dim) !important;
      }
      .CodeMirror-focused .CodeMirror-selected {
        background: var(--accent-dim) !important;
      }

      /* unsaved indicator */
      .unsaved-bar {
        height: 2px;
        background: var(--accent);
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .unsaved-bar.visible {
        opacity: 1;
      }

      /* RIGHT — PDF */
      .preview-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #1a1a1a;
      }

      .preview-pane .pane-header {
        background: var(--surface);
      }

      .pdf-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .btn-icon {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
        font-family: var(--font-mono);
        padding: 3px 8px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn-icon:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      #pdf-frame {
        flex: 1;
        width: 100%;
        border: none;
        background: #2a2a2a;
      }

      .pdf-placeholder {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--muted);
      }

      .pdf-placeholder .icon {
        font-size: 40px;
        opacity: 0.3;
      }

      .pdf-placeholder p {
        font-family: var(--font-mono);
        font-size: 12px;
      }

      .error-banner {
        background: rgba(255, 107, 107, 0.08);
        border-top: 1px solid rgba(255, 107, 107, 0.3);
        padding: 10px 16px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--red);
        max-height: 120px;
        overflow-y: auto;
        display: none;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .error-banner.visible {
        display: block;
      }

      .warning-banner {
        background: rgba(245, 166, 35, 0.08);
        border-top: 1px solid rgba(245, 166, 35, 0.3);
        padding: 10px 16px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: #f5a623;
        display: none;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .warning-banner.visible {
        display: block;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 16px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text);
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .toast.success {
        border-color: var(--accent);
      }
      .toast.error {
        border-color: var(--red);
      }

      /* RESIZER */
      .resizer {
        width: 4px;
        background: var(--border);
        cursor: col-resize;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .resizer:hover {
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">yaml<span>/</span>cv</div>
      <div class="header-right">
        <div class="status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">idle</span>
        </div>
        <button class="btn-save" id="btn-save" onclick="save()">
          ⌘ Save & Build
        </button>
      </div>
    </header>

    <div class="split">
      <div class="editor-pane" id="editor-pane">
        <div class="pane-header">
          <span class="pane-label">details.yml</span>
          <select
            class="template-select"
            id="template-select"
            onchange="loadTemplate()"
          ></select>
        </div>
        <div class="editor-wrap">
          <textarea id="editor"></textarea>
        </div>
        <div class="unsaved-bar" id="unsaved-bar"></div>
      </div>

      <div class="resizer" id="resizer"></div>

      <div class="preview-pane">
        <div class="pane-header">
          <span class="pane-label">PDF Preview</span>
          <div class="pdf-actions">
            <button class="btn-icon" onclick="refreshPDF()">↻ refresh</button>
            <button class="btn-icon" onclick="downloadPDF()">↓ download</button>
          </div>
        </div>
        <iframe id="pdf-frame" style="display: none; flex: 1"></iframe>
        <div class="pdf-placeholder" id="pdf-placeholder">
          <div class="icon">⬚</div>
          <p>save to generate PDF</p>
        </div>
        <div class="error-banner" id="error-banner"></div>
        <div class="warning-banner" id="warning-banner"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
    <script>
      let currentTemplate = "jake";
      let pdfCacheBust = Date.now();
      let cm;

      function initEditor() {
        cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
          mode: "yaml",
          theme: "material-darker",
          lineNumbers: true,
          indentWithTabs: false,
          tabSize: 2,
          indentUnit: 2,
          lineWrapping: false,
          autofocus: true,
          extraKeys: {
            Tab: (cmInstance) => cmInstance.execCommand("insertSoftTab"),
            "Cmd-S": () => save(),
            "Ctrl-S": () => save(),
          },
        });
        cm.on("change", () => setUnsaved(true));
      }

      async function init() {
        initEditor();
        await loadTemplates();
        await loadDetails();
        await tryLoadPDF();
      }

      async function loadTemplates() {
        const res = await fetch("/api/templates");
        const templates = await res.json();
        const sel = document.getElementById("template-select");
        sel.innerHTML = templates
          .map((t) => `<option value="${t}">${t}</option>`)
          .join("");
        currentTemplate = templates[0] || "jake";
      }

      async function loadTemplate() {
        currentTemplate = document.getElementById("template-select").value;
        await loadDetails();
        await tryLoadPDF();
      }

      async function loadDetails() {
        const res = await fetch(`/api/details?template=${currentTemplate}`);
        if (res.ok) {
          const text = await res.text();
          cm.setValue(text);
          setUnsaved(false);
        }
      }

      async function tryLoadPDF() {
        const res = await fetch(
          `/api/pdf?template=${currentTemplate}&v=${pdfCacheBust}`,
        );
        if (res.ok)
          showPDF(`/api/pdf?template=${currentTemplate}&v=${pdfCacheBust}`);
      }

      async function save() {
        const content = cm.getValue();
        setStatus("building", "building...");
        hideError();
        document.getElementById("btn-save").disabled = true;

        try {
          const res = await fetch(`/api/save?template=${currentTemplate}`, {
            method: "POST",
            body: content,
            headers: { "Content-Type": "text/plain" },
          });

          const data = await res.json();

          if (data.ok) {
            setUnsaved(false);
            pdfCacheBust = Date.now();
            showPDF(`/api/pdf?template=${currentTemplate}&v=${pdfCacheBust}`);
            setStatus("ready", "ready");
            toast("✓ PDF updated", "success");
            if (data.warning) showWarning(data.warning); // show warning alongside PDF
          } else {
            setStatus("error", "build failed");
            showError(data.error);
            toast("✗ Build failed", "error");
          }
        } catch (e) {
          setStatus("error", "error");
          toast("✗ Save failed", "error");
        } finally {
          document.getElementById("btn-save").disabled = false;
        }
      }

      function showPDF(url) {
        const frame = document.getElementById("pdf-frame");
        const placeholder = document.getElementById("pdf-placeholder");
        frame.src = url;
        frame.style.display = "block";
        placeholder.style.display = "none";
        hideError();
        hideWarning();
      }

      function refreshPDF() {
        pdfCacheBust = Date.now();
        tryLoadPDF();
      }

      function downloadPDF() {
        const a = document.createElement("a");
        a.href = `/api/pdf?template=${currentTemplate}&v=${Date.now()}`;
        a.download = `resume.pdf`;
        a.click();
      }

      function showError(msg) {
        const el = document.getElementById("error-banner");
        el.textContent = msg;
        el.classList.add("visible");
      }

      function showWarning(msg) {
        const el = document.getElementById("warning-banner");
        el.textContent = msg;
        el.classList.add("visible");
      }

      function hideError() {
        document.getElementById("error-banner").classList.remove("visible");
      }

      function hideWarning() {
        document.getElementById("warning-banner").classList.remove("visible");
      }

      function setStatus(type, text) {
        document.getElementById("status-dot").className = `status-dot ${type}`;
        document.getElementById("status-text").textContent = text;
      }

      function setUnsaved(val) {
        document.getElementById("unsaved-bar").classList.toggle("visible", val);
      }

      function toast(msg, type = "") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = `toast ${type} show`;
        setTimeout(() => el.classList.remove("show"), 3000);
      }

      const resizer = document.getElementById("resizer");
      const leftPane = document.getElementById("editor-pane");
      let isResizing = false;

      resizer.addEventListener("mousedown", () => {
        isResizing = true;
      });
      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;
        const pct = (e.clientX / window.innerWidth) * 100;
        if (pct > 20 && pct < 80) {
          leftPane.style.width = pct + "%";
          cm.refresh();
        }
      });
      document.addEventListener("mouseup", () => {
        isResizing = false;
      });

      init();
    </script>
  </body>
</html>
